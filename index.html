<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجرات فضاء المعرفة ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --main:#6C63FF;
    --grad:linear-gradient(135deg,#667eea,#764ba2);
}

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background: radial-gradient(circle at top,#1a1a2e,#0f0f1a);
    color:white;
    overflow-x:hidden;
}

/* نجوم خلفية */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2}
    to{opacity:1}
}

/* شاشة البداية */
.welcome{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:2;
    position:relative;
}

.title{
    font-size:3rem;
    font-weight:800;
    background:linear-gradient(90deg,#fff,#aaa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:fadeUp 1.5s ease;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
}

.btn{
    margin-top:30px;
    padding:15px 40px;
    border-radius:50px;
    border:none;
    font-size:18px;
    cursor:pointer;
    background:var(--grad);
    color:white;
    transition:.4s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #6C63FF;
}

/* المحتوى */
.main{
    display:none;
    padding:80px 20px;
    text-align:center;
    position:relative;
    z-index:2;
}

.section-title{
    font-size:2.5rem;
    margin-bottom:40px;
}

/* الكروت */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
}

.card{
    width:250px;
    height:200px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.4rem;
    cursor:pointer;
    transition:.4s;
    border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
    transform:translateY(-15px) scale(1.05);
    box-shadow:0 0 30px rgba(108,99,255,0.5);
}

/* صفحات */
.page{
    display:none;
    padding:100px 20px;
    text-align:center;
}

.active{
    display:block;
}

/* زر الرجوع */
.back{
    position:fixed;
    top:20px;
    right:20px;
    padding:10px 15px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:var(--grad);
    color:white;
}

/* حركة ظهور */
.fade{
    animation:fadeUp 1s;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- البداية -->
<div class="welcome" id="welcome">
    <div class="title">مجرات فضاء المعرفة ✨</div>
    <button class="btn" onclick="enter()">دخول الموقع</button>
</div>

<!-- الرئيسية -->
<div class="main" id="main">
    <div class="section-title">لسنا الوحيدين ولكننا المميزون ✨</div>

    <div class="cards">
        <div class="card" onclick="openPage('about')">من نحن</div>
        <div class="card" onclick="openPage('achievements')">إنجازاتنا</div>
        <div class="card" onclick="openPage('team')">فريقنا</div>
        <div class="card" onclick="openPage('contact')">تواصل معنا</div>
    </div>
</div>

<!-- الصفحات -->
<div id="about" class="page">
<button class="back" onclick="back()">⬅</button>
<h2>من نحن</h2>
<p>نحن فريق مبدع نسعى لصناعة التميز ✨</p>
</div>

<div id="achievements" class="page">
<button class="back" onclick="back()">⬅</button>
<h2>إنجازاتنا</h2>
<p>حققنا العديد من الإنجازات الرائعة 🚀</p>
</div>

<div id="team" class="page">
<button class="back" onclick="back()">⬅</button>
<h2>فريقنا</h2>
<p>أعضاء مميزين يصنعون الفرق ⭐</p>
</div>

<div id="contact" class="page">
<button class="back" onclick="back()">⬅</button>
<h2>تواصل معنا</h2>
<p>راسلونا لأي استفسار 💬</p>
</div>

<script>
// دخول
function enter(){
    document.getElementById("welcome").style.display="none";
    document.getElementById("main").style.display="block";
}

// فتح صفحة
function openPage(id){
    document.getElementById("main").style.display="none";
    document.getElementById(id).classList.add("active");
}

// رجوع
function back(){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("main").style.display="block";
}

// نجوم
for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(1+Math.random()*2)+"s";
    document.getElementById("stars").appendChild(s);
}
</script>

</body>
</html>
