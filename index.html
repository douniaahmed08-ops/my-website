<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجرات فضاء المعرفة ✨</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #4A90E2;
            --light-blue: #A8D5FF;
            --dark-blue: #2C5AA0;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #4A90E2 0%, #50C9C3 100%);
            --gradient-3: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-light: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --white: #FFFFFF;
            --shadow: 0 20px 60px rgba(74, 144, 226, 0.2);
            --glow: 0 0 30px rgba(74, 144, 226, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-light);
            overflow-x: hidden;
            line-height: 1.7;
            color: #333;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            box-shadow: var(--shadow);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: var(--gradient-1);
            color: white;
            text-align: center;
        }

        .welcome-text {
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        .enter-btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            border: none;
            background: white;
            color: var(--primary-blue);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .main-content {
            display: none;
        }

        .main-content.active {
            display: block;
        }

        .intro-section {
            padding: 120px 20px;
            text-align: center;
        }

        .nav-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .nav-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .content-page {
            display: none;
            padding: 120px 20px;
        }

        .content-page.active {
            display: block;
        }

        .back-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 10px;
            border-radius: 50%;
            border: none;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">مجرات فضاء المعرفة ✨</div>
    </div>
</nav>

<div class="welcome-screen" id="welcomeScreen">
    <h1 class="welcome-text">نرحب بكم ✨</h1>
    <button class="enter-btn" onclick="enterSite()">دخول</button>
</div>

<div class="main-content" id="mainContent">
    <section class="intro-section">
        <h2>لسنا الوحيدين ولكننا المميزون ✨</h2>

        <div class="nav-cards">
            <div class="nav-card" onclick="openPage('about')">من نحن</div>
            <div class="nav-card" onclick="openPage('achievements')">إنجازاتنا</div>
        </div>
    </section>
</div>

<section id="about" class="content-page">
    <button class="back-btn" onclick="goBack()">⬅</button>
    <h2>من نحن</h2>
    <p>نحن فريق مبدع ✨</p>
</section>

<section id="achievements" class="content-page">
    <button class="back-btn" onclick="goBack()">⬅</button>
    <h2>إنجازاتنا</h2>
    <p>إنجازات رائعة 🚀</p>
</section>

<script>
function enterSite() {
    document.getElementById("welcomeScreen").style.display = "none";
    document.getElementById("mainContent").classList.add("active");
}

function openPage(pageId) {
    document.getElementById("mainContent").style.display = "none";
    document.getElementById(pageId).classList.add("active");
}

function goBack() {
    document.querySelectorAll(".content-page").forEach(p => p.classList.remove("active"));
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
