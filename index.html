<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مجرات فضاء المعرفة ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:black;
    overflow:hidden;
    color:white;
}

/* خلفية النجوم */
.stars{
    position:fixed;
    width:100%;
    height:200%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation:moveStars 60s linear infinite;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

/* شاشة البداية */
.welcome{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00f2fe;
}

/* المحتوى */
.main{
    display:none;
    text-align:center;
    padding:80px 20px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    cursor:pointer;
    backdrop-filter:blur(10px);
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
}

/* الصفحات */
.page{
    display:none;
    text-align:center;
    padding:100px 20px;
}

/* فراشات */
.butterfly{
    position:absolute;
    font-size:24px;
    color:#6ecbff;
    animation:fly 10s linear infinite;
    filter:drop-shadow(0 0 10px #6ecbff);
}

@keyframes fly{
    from{
        transform:translateY(100vh) translateX(0);
    }
    to{
        transform:translateY(-100px) translateX(100px);
    }
}

/* لمعات */
.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:spark 1s infinite alternate;
}

@keyframes spark{
    from{opacity:0.2}
    to{opacity:1}
}

/* انتقال */
.transition{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    pointer-events:none;
}

.transition.active{
    animation:flash 0.8s;
}

@keyframes flash{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="transition" id="transition"></div>

<!-- البداية -->
<div class="welcome" id="welcome">
<h1>مجرات فضاء المعرفة ✨</h1>
<button onclick="enter()">دخول</button>
</div>

<!-- الرئيسية -->
<div class="main" id="main">
<h2>لسنا الوحيدين ولكننا المميزون ✨</h2>

<div class="cards">
<div class="card" onclick="openPage('about')">من نحن</div>
<div class="card" onclick="openPage('achievements')">إنجازاتنا</div>
</div>
</div>

<!-- الصفحات -->
<div id="about" class="page">
<button onclick="back()">رجوع</button>
<h2>من نحن</h2>
<p>فريق مبدع ✨</p>
</div>

<div id="achievements" class="page">
<button onclick="back()">رجوع</button>
<h2>إنجازاتنا</h2>
<p>إنجازات رهيبة 🚀</p>
</div>

<script>

// دخول
function enter(){
    document.getElementById("welcome").style.display="none";
    document.getElementById("main").style.display="block";
}

// انتقال
function flash(){
    let t=document.getElementById("transition");
    t.classList.add("active");
    setTimeout(()=>t.classList.remove("active"),800);
}

// فتح صفحة
function openPage(id){
    flash();
    setTimeout(()=>{
        document.getElementById("main").style.display="none";
        document.getElementById(id).style.display="block";
    },400);
}

// رجوع
function back(){
    flash();
    setTimeout(()=>{
        document.querySelectorAll(".page").forEach(p=>p.style.display="none");
        document.getElementById("main").style.display="block";
    },400);
}

// فراشات + لمعات
for(let i=0;i<8;i++){
    let b=document.createElement("div");
    b.className="butterfly";
    b.innerHTML="🦋";
    b.style.left=Math.random()*100+"%";
    b.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(b);
}

for(let i=0;i<30;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    document.body.appendChild(s);
}

</script>

</body>
</html>
